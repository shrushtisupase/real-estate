<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Role Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline-variant": "#c8c5cb",
                      "primary-container": "#1b1b1e",
                      "on-tertiary-fixed-variant": "#494640",
                      "outline": "#77767b",
                      "surface-alt": "#F5F6F7",
                      "on-surface": "#1a1c1c",
                      "surface-container-low": "#f3f3f3",
                      "on-primary-fixed": "#1b1b1e",
                      "secondary-fixed-dim": "#c6c5cf",
                      "status-warning": "#F5D04E",
                      "status-success": "#19A874",
                      "surface-container-highest": "#e2e2e2",
                      "on-tertiary-fixed": "#1d1b16",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#f0f1f1",
                      "on-primary": "#ffffff",
                      "surface-container-high": "#e8e8e8",
                      "background": "#f9f9f9",
                      "surface-container": "#eeeeee",
                      "on-primary-fixed-variant": "#47464a",
                      "on-tertiary": "#ffffff",
                      "on-error-container": "#93000a",
                      "status-error": "#EF4444",
                      "on-error": "#ffffff",
                      "surface-dim": "#dadada",
                      "error": "#ba1a1a",
                      "secondary": "#5d5e66",
                      "on-surface-variant": "#47464b",
                      "status-info": "#3B82F6",
                      "surface-variant": "#e2e2e2",
                      "error-container": "#ffdad6",
                      "tertiary-fixed-dim": "#cbc6bd",
                      "primary-fixed": "#e4e1e6",
                      "inverse-surface": "#2f3131",
                      "surface-bright": "#f9f9f9",
                      "on-secondary-fixed": "#1a1b22",
                      "primary": "#000000",
                      "surface-container-lowest": "#ffffff",
                      "surface": "#f9f9f9",
                      "surface-tint": "#5f5e61",
                      "tertiary": "#000000",
                      "on-tertiary-container": "#88837c",
                      "secondary-fixed": "#e3e1ec",
                      "inverse-primary": "#c8c5ca",
                      "border-subtle": "#E4E4E7",
                      "secondary-container": "#e3e1ec",
                      "primary-fixed-dim": "#c8c5ca",
                      "on-secondary-fixed-variant": "#46464e",
                      "tertiary-container": "#1d1b16",
                      "on-primary-container": "#858387",
                      "on-background": "#1a1c1c",
                      "tertiary-fixed": "#e8e2d9",
                      "on-secondary-container": "#63646c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "sidebar-collapsed": "64px",
                      "density-sm": "8px",
                      "density-md": "12px",
                      "sidebar-width": "240px",
                      "unit": "4px",
                      "gutter": "16px",
                      "container-margin": "24px",
                      "density-xs": "4px"
              },
              "fontFamily": {
                      "label-md": ["Geist", "sans-serif"],
                      "headline-md": ["Geist", "sans-serif"],
                      "headline-sm": ["Geist", "sans-serif"],
                      "body-md": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"],
                      "meta-text": ["Inter", "sans-serif"],
                      "label-sm": ["Geist", "sans-serif"],
                      "headline-lg": ["Geist", "sans-serif"]
              },
              "fontSize": {
                      "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "meta-text": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "14px", "fontWeight": "500"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
<style>
        /* Ensuring imports load correctly if not system fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        /* Utility for hiding radio buttons visually but keeping them accessible */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-surface-variant">
<!-- Onboarding Layout (Nav Suppressed) -->
<main class="flex-1 flex flex-col items-center justify-start pt-16 pb-24 px-container-margin w-full">
<div class="w-full max-w-[840px] flex flex-col items-center">
<!-- Progress Indicator -->
<div class="w-full max-w-[200px] flex flex-col items-center gap-3 mb-16">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Step 1 of 3</span>
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-primary rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Header -->
<div class="text-center mb-12">
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-3">What best describes you?</h1>
<p class="text-body-md font-body-md text-on-surface-variant max-w-md mx-auto">
                    Select your primary role so we can optimize your dashboard and toolset for your daily workflow.
                </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full mb-12">
<!-- Role Card: Agent -->
<label class="group relative flex flex-col p-container-margin bg-surface-container-lowest border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-alt transition-colors duration-200">
<input class="sr-only peer" name="role_selection" type="radio" value="agent"/>
<!-- Icon -->
<span class="material-symbols-outlined text-outline peer-checked:text-primary transition-colors text-[28px] mb-6" data-icon="real_estate_agent">real_estate_agent</span>
<!-- Content -->
<span class="text-headline-sm font-headline-sm text-on-surface mb-2">Agent</span>
<span class="text-meta-text font-meta-text text-on-surface-variant leading-relaxed">
                        I focus on managing individual client relationships, active listings, and closing deals.
                    </span>
<!-- Active State Border Overlay -->
<div class="absolute inset-0 border-[1.5px] border-transparent rounded-lg pointer-events-none peer-checked:border-primary peer-checked:shadow-sm transition-all"></div>
</label>
<!-- Role Card: Broker -->
<label class="group relative flex flex-col p-container-margin bg-surface-container-lowest border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-alt transition-colors duration-200">
<input class="sr-only peer" name="role_selection" type="radio" value="broker"/>
<!-- Icon -->
<span class="material-symbols-outlined text-outline peer-checked:text-primary transition-colors text-[28px] mb-6" data-icon="domain">domain</span>
<!-- Content -->
<span class="text-headline-sm font-headline-sm text-on-surface mb-2">Broker</span>
<span class="text-meta-text font-meta-text text-on-surface-variant leading-relaxed">
                        I oversee a team of agents, manage office operations, and track portfolio-level metrics.
                    </span>
<!-- Active State Border Overlay -->
<div class="absolute inset-0 border-[1.5px] border-transparent rounded-lg pointer-events-none peer-checked:border-primary peer-checked:shadow-sm transition-all"></div>
</label>
<!-- Role Card: Admin -->
<label class="group relative flex flex-col p-container-margin bg-surface-container-lowest border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-alt transition-colors duration-200">
<input class="sr-only peer" name="role_selection" type="radio" value="admin"/>
<!-- Icon -->
<span class="material-symbols-outlined text-outline peer-checked:text-primary transition-colors text-[28px] mb-6" data-icon="admin_panel_settings">admin_panel_settings</span>
<!-- Content -->
<span class="text-headline-sm font-headline-sm text-on-surface mb-2">Admin / Ops</span>
<span class="text-meta-text font-meta-text text-on-surface-variant leading-relaxed">
                        I handle transaction coordination, document compliance, and organizational settings.
                    </span>
<!-- Active State Border Overlay -->
<div class="absolute inset-0 border-[1.5px] border-transparent rounded-lg pointer-events-none peer-checked:border-primary peer-checked:shadow-sm transition-all"></div>
</label>
</div>
<!-- Footer Action Area -->
<div class="w-full flex justify-end items-center pt-8 border-t border-border-subtle">
<button class="bg-primary text-on-primary font-label-md text-label-md px-6 py-2.5 rounded-DEFAULT opacity-40 cursor-not-allowed transition-all duration-200 ease-in-out flex items-center gap-2" disabled="" id="btn-continue">
                    Continue
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleRadios = document.querySelectorAll('input[name="role_selection"]');
            const continueBtn = document.getElementById('btn-continue');

            // Listen for changes on any radio button to enable the continue button
            roleRadios.forEach(radio => {
                radio.addEventListener('change', () => {
                    const anyChecked = Array.from(roleRadios).some(r => r.checked);
                    if (anyChecked) {
                        continueBtn.disabled = false;
                        continueBtn.classList.remove('opacity-40', 'cursor-not-allowed');
                        continueBtn.classList.add('hover:opacity-90', 'cursor-pointer', 'shadow-sm');
                    }
                });
            });
        });
    </script>
</body></html>
