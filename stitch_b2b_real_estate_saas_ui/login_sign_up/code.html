<style>
        /* Import fonts as a fallback/cleanliness */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        /* Simulating Geist with a system stack for the prototype if actual webfont fails */
        @font-face {
            font-family: 'Geist';
            src: local('-apple-system'), local('BlinkMacSystemFont'), local('San Francisco');
            font-weight: normal;
        }

        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }

<body class="min-h-screen w-full flex antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Note: Navigation shell (SideNav/TopNav) is suppressed as this is a transactional authentication page. -->
<!-- Left Panel: Authentication Form -->
<div class="flex-1 flex flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:w-1/2 lg:px-20 xl:px-24 bg-background z-10 relative">
<div class="mx-auto w-full max-w-sm">
<!-- Brand Header -->
<div class="mb-10">
<div class="flex items-center gap-2 mb-8">
<div class="w-8 h-8 rounded-md bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-xl" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<span class="font-headline-sm text-headline-sm text-primary tracking-tight">B2B Real Estate</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Sign in to your account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details below to access your workspace.</p>
</div>
<!-- Form Card -->
<div class="bg-surface rounded-xl border border-border-subtle p-8 shadow-[0_1px_3px_0_rgba(0,0,0,0.05)]">
<form action="#" class="space-y-5" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label-sm text-label-sm text-on-surface" for="email">Email address</label>
<div class="relative">
<input autocomplete="email" class="block w-full h-10 px-3 py-2 bg-surface-lowest border border-border-subtle rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-meta-text text-meta-text text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input autocomplete="current-password" class="block w-full h-10 px-3 py-2 bg-surface-lowest border border-border-subtle rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center items-center h-10 px-4 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200 shadow-sm" type="submit">
                            Sign in
                        </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8 mb-6 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-subtle"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-surface font-meta-text text-meta-text text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Secondary Auth Action -->
<div>
<button class="w-full flex justify-center items-center gap-2 h-10 px-4 bg-surface text-on-surface border border-border-subtle rounded-lg font-label-md text-label-md hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-border-subtle transition-colors duration-200" type="button">
<svg class="w-4 h-4" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google

</div>
</div>
<!-- Toggle Link -->
<p class="mt-8 text-center font-meta-text text-meta-text text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-sm text-label-sm text-primary hover:underline underline-offset-4" href="#">Request access</a>
</p>
</div>
</div>
<!-- Right Panel: Decorative / Preview -->
<div class="hidden lg:block lg:flex-1 relative bg-surface-container-low border-l border-border-subtle overflow-hidden">

</div>

</div>
</div>
<!-- Subtle technical grid background -->
<div class="absolute inset-0 pointer-events-none" style="background-image: radial-gradient(theme('colors.border-subtle') 1px, transparent 1px); background-size: 32px 32px; opacity: 0.4;"></div>
